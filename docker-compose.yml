services:
  postgres:
    image: postgres:17-alpine
    container_name: pcshop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pcshop}
      POSTGRES_USER: ${POSTGRES_USER:-pcshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pcshop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  adminer:
    image: adminer:5-standalone
    container_name: pcshop-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    image: node:22-slim
    container_name: pcshop-frontend
    user: "1000:1000"
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5174:5173"
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: always

  backend:
    image: oven/bun:1.3-slim
    container_name: pcshop-backend
    user: "1000:1000"
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://${POSTGRES_USER:-pcshop}:${POSTGRES_PASSWORD:-pcshop}@postgres:5432/${POSTGRES_DB:-pcshop}
    command: bun run backend:prod
    healthcheck:
      test: ["CMD", "bun", "-e", "const response = await fetch('http://127.0.0.1:3001/api/featured-pcs'); if (!response.ok) process.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: pcshop-tunnel
    network_mode: host
    user: "1000:1000"
    volumes:
      - /home/q/.cloudflared:/home/q/.cloudflared
    command: tunnel --config /home/q/.cloudflared/pc-shop.yml run
    restart: always
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  postgres_data:
